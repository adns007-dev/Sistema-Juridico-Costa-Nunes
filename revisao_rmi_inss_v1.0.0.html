<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Revisão de RMI — Sistema Costa Nunes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
:root{
  --navy:#1B2B4B;--navy-mid:#243A5F;--navy-light:#2E4A78;
  --gold:#C9A84C;--gold-dark:#A07830;--gold-light:#F0D898;
  --bg:#F2F5FA;--surface:#FFF;--surface2:#F7F9FD;
  --border:#D5DCE9;--border-mid:#B8C4D8;
  --text:#1A1F2E;--text-mid:#3D4B6A;--text-muted:#7080A0;--text-hint:#9AAAC0;
  --green:#1A7A4A;--green-bg:#EAF7F0;--green-bd:#A3D9BC;
  --teal:#0B6B8C;--teal-bg:#E5F4FA;--teal-bd:#88C8DF;
  --blue-bg:#EAF0FB;--blue-bd:#A3B9E0;
  --amber:#A07830;--amber-bg:#FDF9EE;--amber-bd:#F0D898;
  --red:#C0392B;--red-bg:#FDF0EE;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
  --font:'IBM Plex Sans',sans-serif;--font-serif:'Playfair Display',serif;--font-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
.app-header{background:var(--navy);padding:0 40px;display:flex;align-items:center;gap:24px;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hbadge{background:var(--gold);color:var(--navy);font-family:var(--font-mono);font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-sm);letter-spacing:.06em;text-transform:uppercase}
.htitle{font-family:var(--font-serif);font-size:18px;color:#fff;font-weight:600}
.hsub{font-size:12px;color:#8AA4C8}
.hright{margin-left:auto;display:flex;align-items:center;gap:12px}
.vbadge{background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.35);border-radius:var(--r-sm);padding:4px 10px;font-family:var(--font-mono);font-size:11px;color:var(--gold-light);letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.vdot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
.steps{display:flex;align-items:center;gap:6px}
.sdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--font-mono);flex-shrink:0}
.sdot.done{background:var(--gold);color:var(--navy)}
.sdot.active{background:#fff;color:var(--navy)}
.sdot.idle{background:rgba(255,255,255,.12);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.2)}
.slabel{font-size:11px;color:rgba(255,255,255,.5)}
.slabel.active{color:rgba(255,255,255,.9)}
.ssep{width:16px;height:1px;background:rgba(255,255,255,.15);flex-shrink:0}
.wrap{max-width:1140px;margin:0 auto;padding:36px 24px 60px}
.ptitle{font-family:var(--font-serif);font-size:26px;font-weight:700;color:var(--navy);margin-bottom:6px}
.psub{font-size:14px;color:var(--text-muted);margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 1px 4px rgba(27,43,75,.07)}
.chead{padding:15px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chead h2{font-size:15px;font-weight:600;color:var(--navy)}
.chead p{font-size:12px;color:var(--text-muted);margin-top:2px}
.cbody{padding:20px 22px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:0;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
.cf{padding:13px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.cfl{font-size:11px;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cfv{font-family:var(--font-mono);font-size:14px;font-weight:500}
.cfv.g{color:var(--green);font-size:16px}
.cfv.t{color:var(--teal);font-size:16px}
.dz{border:2px dashed var(--border-mid);border-radius:var(--r-lg);padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.dz:hover,.dz.ov{border-color:var(--navy-light);background:var(--blue-bg)}
.di{font-size:44px;display:block;margin-bottom:12px}
.dt{font-size:15px;font-weight:500;color:var(--text-mid);margin-bottom:4px}
.dh{font-size:13px;color:var(--text-hint)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:12px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 15px}
.mc.acc{border-color:var(--green-bd);background:var(--green-bg)}
.mc.tea{border-color:var(--teal-bd);background:var(--teal-bg)}
.ml{font-size:11px;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.mv{font-family:var(--font-mono);font-size:14px;font-weight:500}
.mv.big{font-size:22px;color:var(--green)}
.mv.red{color:var(--red)}
/* Sex toggle */
.stog{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;width:fit-content}
.sbtn{padding:10px 28px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);background:var(--surface2);color:var(--text-muted);transition:all .15s}
.sbtn.am{background:var(--navy);color:#fff}
.sbtn.af{background:#7B2D8B;color:#fff}
.sbtn:not(:last-child){border-right:1px solid var(--border)}
/* RDP badge */
.rdpb{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-radius:var(--r-lg);border:1.5px solid var(--border);margin-top:16px;flex-wrap:wrap}
.rdpb.on{border-color:var(--green-bd);background:var(--green-bg)}
.rdpb.on2{border-color:var(--teal-bd);background:var(--teal-bg)}
.rdpb.off{border-color:var(--amber-bd);background:var(--amber-bg)}
.rdpi{font-size:28px;flex-shrink:0;margin-top:2px}
.rdpt{font-size:14px;font-weight:600;margin-bottom:3px}
.rdps{font-size:12px;color:var(--text-muted)}
.rdpf{font-family:var(--font-mono);font-size:12px;color:var(--text-mid);margin-top:5px}
/* Formula */
.fbox{background:#EFF2F8;border:1px solid #C8D4EC;border-radius:var(--r-md);padding:14px 18px;font-size:13px;font-family:var(--font-mono);flex:1;min-width:200px;line-height:2.2}
.fbox.gb{background:var(--green-bg);border-color:var(--green-bd)}
.fbox.tb{background:var(--teal-bg);border-color:var(--teal-bd)}
.fl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-hint);font-family:var(--font);display:block;margin-bottom:2px}
.fv{color:var(--navy-light);font-weight:500}
.fr{color:var(--green);font-weight:600;font-size:15px}
.frt{color:var(--teal);font-weight:600;font-size:15px}
.fhint{font-size:11px;color:var(--text-hint)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:var(--r-md);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;font-family:var(--font)}
.btn:active{transform:scale(.98)}
.btn-n{background:var(--navy);color:#fff}
.btn-n:hover{background:var(--navy-mid)}
.btn-g{background:var(--gold);color:var(--navy);font-weight:600}
.btn-g:hover{background:var(--gold-dark);color:#fff}
.btn-gh{background:transparent;color:var(--text-muted);padding:8px 0;font-size:13px;border:none;font-family:var(--font);cursor:pointer}
.btn-gh:hover{color:var(--text)}
.btn-o{background:var(--surface);border:1px solid var(--border);color:var(--text-mid)}
.btn-o:hover{border-color:var(--border-mid);background:var(--surface2)}
.brow{display:flex;align-items:center;gap:12px;margin-top:20px;flex-wrap:wrap}
/* Banners */
.ib{background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--r-md);padding:11px 14px;font-size:13px;color:var(--navy-light)}
.wb{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r-md);padding:11px 14px;font-size:13px;color:var(--amber)}
.eb{background:var(--red-bg);border:1px solid #E8B4AE;border-radius:var(--r-md);padding:12px 16px;font-size:13px;color:var(--red);display:flex;gap:8px;margin-bottom:20px}
/* Preview */
.pvbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-top:14px}
.pvh{background:var(--navy);color:rgba(255,255,255,.85);padding:8px 14px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between}
.pvb{padding:10px 14px;font-family:var(--font-mono);font-size:12px}
.pvr{display:flex;gap:24px;padding:3px 0;border-bottom:1px solid var(--border)}
.pvr:last-child{border-bottom:none}
.pvc{min-width:90px}
/* Table */
.tw{overflow-x:auto;border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:0 1px 4px rgba(27,43,75,.07)}
table{width:100%;border-collapse:collapse;min-width:680px}
thead th{background:var(--navy);color:rgba(255,255,255,.85);padding:9px 11px;font-size:11px;font-weight:500;text-align:right;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
thead th.l{text-align:left}
tbody tr:nth-child(even){background:var(--surface2)}
tbody tr:hover{background:#EDF2FA}
tbody tr.rm{background:var(--green-bg)}
tbody tr.rm:hover{background:#D8F0E5}
tbody td{padding:6px 11px;font-size:13px;text-align:right;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody td.l{text-align:left}
.mo{font-family:var(--font-mono)}
.mu{color:var(--text-hint)}
.gr{color:var(--green);font-weight:500}
.tbar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.tbar h3{font-size:14px;font-weight:600;color:var(--navy)}
.ckl{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-mid);cursor:pointer;margin-left:auto}
.ckl input{accent-color:var(--navy);width:14px;height:14px}
/* Compare */
.cgd{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:24px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;box-shadow:0 1px 4px rgba(27,43,75,.07)}
.cc.hl{border-color:var(--green-bd);background:var(--green-bg)}
.cct{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-hint);margin-bottom:12px}
.ccr{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.ccb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;min-width:46px}
.bb{color:var(--text-hint)}.ba{color:var(--green)}
.ccv{font-family:var(--font-mono);font-size:13px;color:var(--text-mid)}
.ccv.big{font-size:21px;font-weight:600;color:var(--green)}
.ccd{font-size:12px;font-family:var(--font-mono);color:var(--green);margin-top:8px;padding-top:8px;border-top:1px solid var(--green-bd)}
/* Misc */
.finput{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 14px;font-family:var(--font-mono);font-size:16px;color:var(--text);outline:none;width:160px;text-align:center;transition:border-color .15s}
.finput:focus{border-color:var(--navy-light);box-shadow:0 0 0 3px rgba(46,74,120,.08)}
.frow{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.div{height:1px;background:var(--border);margin:24px 0}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.tg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tt{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-bd)}
.ta{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.lw{text-align:center;padding:72px 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{display:block;font-size:36px;margin:0 auto 14px;animation:spin 1.2s linear infinite}
.lm{font-size:14px;color:var(--text-muted)}
@media(max-width:760px){
  .app-header{padding:0 16px}
  .slabel{display:none}
  .wrap{padding:20px 12px 40px}
  .cgd,.metrics{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:1fr 1fr}
}
@media print{
  .app-header,.btn,.brow,.dz,.pvbox{display:none!important}
  body{background:#fff}
}
</style>

<body>
<div id="root"></div>
<script>
window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
const APP_VERSION='1.0.0';
const APP_VERSION_DATE='2025-05';
const {useState,useRef}=React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fBR=n=>{if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})};
const pBR=v=>{if(typeof v==='number')return v;const s=String(v||'').trim().replace(/\s/g,'');if(!s)return 0;if(s.includes(','))return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;return parseFloat(s)||0};
const dN=d=>{const p=String(d||'').split('/');if(p.length<2)return 0;return(parseInt(p[1])||0)*100+(parseInt(p[0])||0)};

function normDate(val){
  if(val==null||val==='')return'';
  if(val instanceof Date&&!isNaN(val))return String(val.getMonth()+1).padStart(2,'0')+'/'+val.getFullYear();
  if(typeof val==='number'){
    if(val>15000&&val<75000){const d=new Date(Math.round((val-25569)*86400*1000));return String(d.getUTCMonth()+1).padStart(2,'0')+'/'+d.getUTCFullYear();}
    return'';
  }
  const s=String(val).trim();
  if(/^\d{2}\/\d{4}$/.test(s))return s;
  if(/^\d{1}\/\d{4}$/.test(s))return'0'+s;
  const mm=s.match(/^(\d{1,2})\/(\d{2})$/);if(mm){const y=parseInt(mm[2]);return mm[1].padStart(2,'0')+'/'+(y>=90?'19':'20')+String(y).padStart(2,'0')}
  const dm=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(dm)return dm[2]+'/'+dm[3];
  const is=s.match(/^(\d{4})-(\d{2})(?:-\d{2})?/);if(is)return is[2]+'/'+is[1];
  const gn=s.match(/^(\d{1,2})[-\/](\d{4})$/);if(gn)return gn[1].padStart(2,'0')+'/'+gn[2];
  return'';
}

// ── Regra de Pontos ───────────────────────────────────────────────────────────
// Tabela pré-EC 103 — Lei 13.183/2015 (85/95 progressiva)
const T_ANTES=[[2018,85,95],[2020,86,96],[2022,87,97],[2024,88,98],[2026,89,99],[9999,90,100]];
// Tabela pós-EC 103/2019 — Regra de Transição (Filiado até a PEC)
// Formato: [ano_máx, pontos_mulher, pontos_homem]
const T_EC103=[
  [2019, 86, 96],
  [2020, 87, 97],
  [2021, 88, 98],
  [2022, 89, 99],
  [2023, 90,100],
  [2024, 91,101],
  [2025, 92,102],
  [2026, 93,103],
  [2027, 94,104],
  [2028, 95,105],
  [2029, 96,105],
  [2030, 97,105],
  [2031, 98,105],
  [2032, 99,105],
  [9999,100,105], // 2033 em diante
];
const EC103=new Date(2019,10,12);
function parseDDMMYYYY(s){if(!s)return null;const p=s.split('/');return p.length<3?null:new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function isEC103after(dv){const d=parseDDMMYYYY(dv);return d&&d>=EC103;}
function getPontos(dv,sexo){
  const d=parseDDMMYYYY(dv);if(!d)return null;
  const ano=d.getFullYear(),col=sexo==='F'?1:2;
  const tab=d>=EC103?T_EC103:T_ANTES;
  return(tab.find(e=>ano<=e[0])||tab[tab.length-1])[col];
}
function verificaRDP(carta,sexo){
  if(!sexo)return{aplica:false,msg:'Selecione o sexo.'};
  if(!carta)return{aplica:false,msg:'Carta não carregada.'};
  const tc=carta.tcAnos||0,tcm=carta.tcMeses||0,id=carta.idadeAnos||0;
  const min=sexo==='F'?30:35;
  if(tc<min)return{aplica:false,msg:`TC ${tc}a ${tcm}m insuficiente (mínimo ${min}a para ${sexo==='F'?'mulher':'homem'}).`};
  const pts=getPontos(carta.dataInicioVigencia,sexo);
  if(!pts)return{aplica:false,msg:'Data de vigência inválida.'};
  const soma=tc+id;
  if(soma<pts)return{aplica:false,pts,soma,tc,id,msg:`TC+Idade = ${tc}+${id} = ${soma} < ${pts} pontos.`};
  return{aplica:true,pts,soma,tc,id,afterEC:isEC103after(carta.dataInicioVigencia)};
}

// ── PDF extraction ────────────────────────────────────────────────────────────
async function extractPDFText(file){
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
  let full='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);const tc=await page.getTextContent();const byY={};
    tc.items.forEach(item=>{if(!item.str.trim())return;const y=Math.round(item.transform[5]);if(!byY[y])byY[y]=[];byY[y].push({s:item.str,x:item.transform[4]})});
    full+=Object.keys(byY).map(Number).sort((a,b)=>b-a).map(y=>byY[y].sort((a,b)=>a.x-b.x).map(i=>i.s).join(' ')).join('\n')+'\n';
  }
  return full;
}
function parseCarta(text){
  const g=(rx,i=1)=>text.match(rx)?.[i]||'';
  const nm=text.match(/Nome:\s*([^\n\r]+)/i);
  const bn=text.match(/N[úu]mero do Benef[íi]cio:\s*([\d./-]+)/i);
  const ri=text.match(/renda mensal de R\$\s*([\d.,]+)/i);
  const vg=text.match(/in[íi]cio de vig[eê]ncia a partir de (\d{2}\/\d{2}\/\d{4})/i);
  const cc=text.match(/Data de Concess[ãa]o[^:\r\n]*:\s*(\d{2}\/\d{2}\/\d{4})/i);
  const fa=text.match(/Fator Previdenci[áa]rio\s*=[\s=]*([\d,]+)/i);
  const tc=text.match(/Tc\s*[-–]\s*Tempo de contribui[çc][ãa]o\s*=\s*(\d+)\s*ano[^,;\d]*(\d+)\s*m[eê]s/i);
  const id=text.match(/Id\s*[-–]\s*Idade\s*=\s*(\d+)\s*ano/i);
  const rx=/\b(\d{3})\s+(\d{2}\/\d{4})\s+([\d.]*\d,\d+)\s+([\d.]*\d,\d+)\s+([\d.]*\d,\d+)/g;
  const rows=[];const seen=new Set();let m;
  while((m=rx.exec(text))!==null){if(seen.has(m[1]))continue;seen.add(m[1]);
    const af=text.slice(m.index+m[0].length,m.index+m[0].length+30);
    rows.push({_id:'c_'+rows.length,seq:parseInt(m[1]),data:m[2],salario:pBR(m[3]),indice:pBR(m[4]),salCorrigido:pBR(m[5]),desconsiderado:/DESCONSIDERADO/i.test(af)});
  }
  rows.sort((a,b)=>a.seq-b.seq);
  return{
    nome:(nm?.[1]||'').trim().replace(/\s+/g,' ')||'—',
    numeroBeneficio:(bn?.[1]||'').trim()||'—',
    rendaMensalInicial:pBR(ri?.[1]),
    dataInicioVigencia:vg?.[1]||cc?.[1]||'—',
    fatorPrevidenciario:pBR(fa?.[1]),
    tcAnos:tc?parseInt(tc[1]):0,tcMeses:tc?parseInt(tc[2]):0,
    idadeAnos:id?parseInt(id[1]):0,rows
  };
}

// ── Spreadsheet parser ────────────────────────────────────────────────────────
function parseSheet(arrays){
  if(!arrays?.length)return[];
  const f=arrays[0];const t0=normDate(f[0]),t1=f.length>1?normDate(f[1]):'';

function App(){
  const[step,setStep]=useState(1);
  const[load,setLoad]=useState(false);const[msg,setMsg]=useState('');
  const[err,setErr]=useState(null);
  const[carta,setCarta]=useState(null);const[cRows,setCRows]=useState([]);
  const[addR,setAdd]=useState([]);
  const[sexo,setSexo]=useState('');
  const[fator,setFator]=useState(0.7912);
  const[res,setRes]=useState(null);

  const handlePDF=async file=>{
    if(!file?.name?.toLowerCase().endsWith('.pdf')){setErr('Selecione um PDF válido.');return;}
    setLoad(true);setErr(null);
    try{
      setMsg('Lendo o PDF…');const text=await extractPDFText(file);
      setMsg('Identificando dados…');const p=parseCarta(text);
      if(!p.rows.length)throw new Error('Nenhuma competência encontrada. Verifique se o PDF é a Carta de Concessão INSS com tabela de salários, e se é texto digital (não escaneado).');
      setCarta(p);setCRows(p.rows);setFator(p.fatorPrevidenciario||0.7912);setAdd([]);setSexo('');setStep(2);
    }catch(e){setErr(e.message);}finally{setLoad(false);}
  };

  const processSheet=arrays=>{
    const rows=parseSheet(arrays);
    if(!rows.length){setErr('Nenhuma linha válida. Verifique as colunas da planilha.');return;}
    setAdd(rows);
  };
  const handleCSV=file=>{
    setErr(null);const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='csv'){
      Papa.parse(file,{header:false,skipEmptyLines:true,
        complete:r=>{
          // Try header:false first; if dates look wrong, also try header:true
          const r1=parseSheet(r.data);
          if(r1.length>0){processSheet(r.data);return;}
          // Fallback: maybe first row is a text header — parse with header:true
          Papa.parse(file,{header:true,skipEmptyLines:true,complete:r2=>{
            const keys=Object.keys(r2.data[0]||{});
            const ck=keys.find(k=>/comp|data|mes|ref|per/i.test(k))||keys[0];
            const vk=keys.find(k=>/valor|sal|contrib/i.test(k))||keys[1];
            const arrays=r2.data.map(row=>[row[ck],row[vk]]);
            processSheet(arrays);
          }});
        },
        error:e=>setErr('CSV: '+e.message)
      });
    } else if(['xlsx','xls'].includes(ext)){
      const rd=new FileReader();
      rd.onload=e=>{
        try{
          // Do NOT use cellDates:true — let dates stay as raw Excel serial numbers
          // normDate() handles serials, Date objects, and string formats
          const wb=XLSX.read(e.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          // raw:true → serial numbers (e.g. 34516 for 01/07/1994)
          const arrays=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
          const rows=parseSheet(arrays);
          if(rows.length===0){
            // Fallback: try raw:false (formatted strings)
            const arrFmt=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
            processSheet(arrFmt);
          } else {
            processSheet(arrays);
          }
        }catch(e){setErr('Erro ao ler Excel: '+e.message);}
      };
      rd.readAsArrayBuffer(file);
    } else {
      setErr('Formato não suportado. Use CSV, XLSX ou XLS.');
    }
  };

  const calculate=()=>{
    const rdp=verificaRDP(carta,sexo);
    const cd=new Set(cRows.map(r=>r.data));
    const cmin=Math.min(...cRows.map(r=>dN(r.data))),cmax=Math.max(...cRows.map(r=>dN(r.data)));
    const addMap={};
    addR.forEach(r=>{const d=dN(r.data);if(d>=cmin&&d<=cmax&&cd.has(r.data))addMap[r.data]=(addMap[r.data]||0)+r.valor;});

    let all=cRows.map(row=>{
      const extra=addMap[row.data]||0,ns=row.salario+extra,nc=parseFloat((ns*row.indice).toFixed(2));
      return{...row,extra,novoSalario:ns,novoCorrigido:nc,changed:extra>0};
    });

    let novaMedia,novaRMI,soma80,n80,modo;

    if(rdp.aplica&&rdp.afterEC){
      // EC 103: 100% de todos os salários, sem fator
      modo='rdp-100';
      soma80=all.reduce((s,r)=>s+r.novoCorrigido,0);
      n80=all.length;
      novaMedia=soma80/n80;
      novaRMI=novaMedia;
      all=all.map(r=>({...r,usadoCalculo:true}));
    }else{
      // 80% maiores
      const sorted=[...all].sort((a,b)=>b.novoCorrigido-a.novoCorrigido);
      n80=Math.floor(all.length*.8);
      soma80=sorted.slice(0,n80).reduce((s,r)=>s+r.novoCorrigido,0);
      novaMedia=soma80/n80;
      if(rdp.aplica&&!rdp.afterEC){modo='rdp-80';novaRMI=novaMedia;}
      else{modo='padrao';novaRMI=novaMedia*fator;}
      const uid=new Set(sorted.slice(0,n80).map(r=>r._id));
      all=all.map(r=>({...r,usadoCalculo:uid.has(r._id)}));
    }

    // Original
    const sO=[...cRows].sort((a,b)=>b.salCorrigido-a.salCorrigido);
    const n80o=Math.floor(cRows.length*.8);
    const s80o=sO.slice(0,n80o).reduce((s,r)=>s+r.salCorrigido,0);
    const origMedia=s80o/n80o;
    let origRMI=carta.rendaMensalInicial;
    if(!origRMI){origRMI=modo==='padrao'?origMedia*fator:modo==='rdp-100'?cRows.reduce((s,r)=>s+r.salCorrigido,0)/cRows.length:origMedia;}

    setRes({
      allRows:all.sort((a,b)=>dN(b.data)-dN(a.data)),
      novaMedia,novaRMI,soma80,n80,
      origMedia,origRMI,
      nTotal:all.length,
      nMod:Object.keys(addMap).length,
      modo

    setStep(4);
  };
